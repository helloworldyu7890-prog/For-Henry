<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BURMA APYR HD</title>
    
    <style>
        :root {
            --theme-color: #B0E0E6; /* အစ်ကိုရွေးချယ်ထားသော ပင်မအရောင် */
            --border-thick: 4px solid #000000;
            --card-gray: #8E8E8E;
            --text-dark: #000000;
        }

        /* Mobile Reset & Core Settings */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Arial Black', 'Impact', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        body { 
            background: #ffffff; 
            color: var(--text-dark); 
            padding: 12px; 
            overflow-x: hidden;
            width: 100%;
        }

        /* 👑 UI Navbar Component */
        .nav-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 16px;
            gap: 10px;
            width: 100%;
        }
        .logo-container {
            flex-grow: 1;
            background: #EAEAEA;
            border: var(--border-thick);
            border-radius: 20px;
            padding: 12px 15px;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
        }
        .logo-container span { font-weight: normal; font-style: italic; font-family: 'Courier New', monospace; color: #666; margin: 0 4px; }
        .logo-circle {
            width: 52px; height: 52px;
            background: #E57C4B; 
            border: var(--border-thick);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: 900;
            flex-shrink: 0;
        }

        /* 💥 Hero Banner Box (Mobile Fitted Layout) */
        .hero-banner {
            background: #ffffff;
            border: var(--border-thick);
            padding: 20px 15px;
            border-radius: 20px; 
            margin-bottom: 20px;
            position: relative;
            width: 100%;
            overflow: hidden;
        }
        .hero-banner::before { content: '+'; position: absolute; top: -14px; left: -1px; font-size: 26px; font-weight: bold; color: #000; }
        .hero-banner::after { content: '+'; position: absolute; bottom: -18px; right: -1px; font-size: 26px; font-weight: bold; color: #000; }
        
        /* 🔄 💯 စာသားအဆုံးထိပေါ်စေရန် ရာခိုင်နှုန်းအခြေပြု Typewriter Logic အသစ် */
        .anim-container {
            width: 100%;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .anim-wrapper {
            display: inline-block;
            overflow: hidden;
            white-space: nowrap;
            border-right: 3px solid var(--text-dark);
            vertical-align: middle;
            max-width: 0%; /* စတင်ချိန်တွင် သုည ရာခိုင်နှုန်း */
        }
        
        .hero-title-wrapper {
            animation: forceType 6s steps(40, end) infinite;
            font-size: 14px;
            font-weight: 900;
        }
        .hero-subtitle-wrapper {
            animation: forceType 10s steps(50, end) infinite;
            font-size: 11px; 
            font-weight: bold; 
            color: #222;
        }
        
        /* စာသားတစ်ခုလုံးကို 100% ပြည့်အောင် ဖော်ပြပေးပြီးမှ ပြန်ပိတ်မည့် စနစ် */
        @keyframes forceType {
            0%, 100% { max-width: 0%; }
            40%, 65% { max-width: 100%; } 
        }

        .hero-link-wrapper { display: flex; justify-content: flex-end; width: 100%; margin-top: 10px; }
        .hero-link { font-size: 13px; color: #000000; text-decoration: none; font-weight: 900; border-bottom: 3px solid #000; text-transform: uppercase; }

        /* 🔍 Search Field Input Box */
        .search-container { padding: 0 0 20px 0; position: relative; width: 100%; }
        .search-input { 
            width: 100%; 
            padding: 12px 45px 12px 15px; 
            border-radius: 15px; 
            border: var(--border-thick); 
            background: #ffffff; 
            outline: none;
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
        }
        .search-icon {
            position: absolute;
            right: 15px; top: 12px;
            width: 24px; height: 24px;
        }

        /* 🏷️ Category Block Panel */
        .category-title {
            font-size: 18px;
            font-style: italic;
            font-weight: 900;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            text-transform: uppercase;
        }
        .category-title::after {
            content: '';
            flex-grow: 1;
            margin-left: 10px;
            border-bottom: 4px dashed #000000;
        }
        .category-title::before {
            content: '🔖';
            order: 3;
            margin-left: 8px;
            font-size: 20px;
        }
        .category-wrapper {
            position: relative;
            margin-bottom: 25px;
            padding: 5px 0;
            display: flex;
            justify-content: center;
            width: 100%;
        }
        .category-bg-line {
            position: absolute;
            top: 50%; left: 0; right: 0;
            height: 14px;
            background: #3A3A3A;
            border: var(--border-thick);
            transform: translateY(-50%);
            z-index: 1;
        }
        .category-buttons {
            display: flex;
            justify-content: space-between;
            width: 100%;
            z-index: 2;
            position: relative;
            gap: 10px;
        }
        .category-btn {
            flex: 1;
            aspect-ratio: 1/1;
            max-width: 80px;
            background: var(--card-gray);
            border: var(--border-thick);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 11px;
            font-weight: 900;
            color: #ffffff;
            cursor: pointer;
            text-transform: uppercase;
        }
        .category-btn.active {
            background: var(--theme-color);
            color: #000000;
        }

        /* 🎬 2-Column Responsive Video Grid */
        .video-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            width: 100%;
        }
        .video-item { 
            background: #ffffff; 
            border-radius: 16px; 
            overflow: hidden; 
            cursor: pointer;
            border: var(--border-thick);
            display: flex;
            flex-direction: column;
            width: 100%;
        }
        .thumb { 
            width: 100%; 
            aspect-ratio: 1.25/1; 
            object-fit: cover; 
            background: #666; 
            border-bottom: 3px solid #000; 
        }
        
        /* 👁️ Fitted Metadata Views Style */
        .video-meta-info {
            padding: 8px 10px;
            background: var(--theme-color); 
            font-size: 11px;
            font-weight: 900;
            color: var(--text-dark);
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 📱 Dedicated Separate Watch View Layer */
        #theaterPage { 
            display: none; 
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #ffffff; 
            padding: 12px; 
            overflow-y: auto;
            z-index: 9999;
        }
        
        /* 🔙 Back Controller Handle Box */
        .back-btn-container {
            display: inline-flex;
            align-items: center;
            background: var(--card-gray);
            border: var(--border-thick);
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 16px;
            cursor: pointer;
        }
        .back-arrow-box {
            background: #E8C5C8; 
            padding: 8px 14px;
            border-right: var(--border-thick);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .back-arrow-box svg { width: 20px; height: 20px; fill: #000000; }
        .back-text-box {
            padding: 0 14px;
            color: #ffffff;
            font-size: 13px;
            font-weight: 900;
        }

        /* 📺 Player Frame Monitor Window Layout */
        .player-box { 
            width: 100%; 
            aspect-ratio: 1.45/1; 
            border-radius: 25px; 
            overflow: hidden; 
            background: var(--theme-color); 
            position: relative; 
            border: var(--border-thick); 
            margin-bottom: 20px;
        }
        
        /* 🎬 Watch Page Title Text Animation Setup */
        .theater-title-container {
            width: 100%;
            overflow: hidden;
            margin-bottom: 15px;
        }
        .theater-title-wrapper {
            animation: forceType 8s steps(35, end) infinite;
            font-size: 13px; 
            font-weight: 900; 
            text-transform: uppercase;
        }

        /* ✨ Suggestions Sub Header Component Line */
        .related-section-title {
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            margin: 25px 0 15px 0;
            display: flex;
            align-items: center;
            width: 100%;
        }
        .related-section-title::after {
            content: '';
            flex-grow: 1;
            margin-left: 10px;
            border-bottom: 4px dashed #000000;
        }
        .related-section-title::before {
            content: '🔖';
            order: 3;
            margin-left: 8px;
            font-size: 20px;
        }

        .loader { display: block; text-align: center; padding: 15px; color: #000; font-size: 14px; font-weight: 900; }
    </style>
</head>
<body>

    <div id="mainPageContent">
        <div class="nav-bar">
            <div class="logo-container" onclick="refreshToRandom()">
                BURMA <span>- APYR -</span> HD
            </div>
            <div class="logo-circle">Logo</div>
        </div>

        <div class="hero-banner">
            <div class="anim-container">
                <div class="anim-wrapper hero-title-wrapper">ပရီမီယမ် အတွေ့အကြုံ ပေးစွမ်းနိုင်မှု-------------</div>
            </div>
            <div class="anim-container">
                <div class="anim-wrapper hero-subtitle-wrapper">မြန်မာကား // ဂျပန်ကား // ကိုရီးယားကား နိုင်ငံတကာကားများကို အဆင့်မြင့်မြင့် အခမဲ့ကြည့်ရှုပါ!</div>
            </div>
            <div class="hero-link-wrapper">
                <a class="hero-link" href="https://burmaapyr.com" target="_blank">BURMAAPYR.COM</a>
            </div>
        </div>

        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="SEARCH...VIDEOS" onkeypress="handleSearch(event)">
            <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>

        <div class="category-title">CATEGORY</div>
        <div class="category-wrapper">
            <div class="category-bg-line"></div>
            <div class="category-buttons">
                <div class="category-btn active" onclick="filterCategory('all', this)">All</div>
                <div class="category-btn" onclick="filterCategory('myanmar', this)">Myanmar</div>
                <div class="category-btn" onclick="filterCategory('japan', this)">Japan</div>
            </div>
        </div>

        <div class="video-grid" id="container"></div>
        <div id="loadingStatus" class="loader" style="display:none;">LOADING VIDEOS...</div>
    </div>


    <div id="theaterPage">
        <div class="back-btn-container" onclick="closePlayer()">
            <div class="back-arrow-box">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </div>
            <div class="back-text-box">နောက်သို့ပြန်သွားရန်</div>
        </div>
        
        <div class="player-box">
            <iframe id="frame" src="" width="100%" height="100%" allowfullscreen style="border:none;"></iframe>
        </div>

        <div class="theater-title-container">
            <div id="vTitle" class="anim-wrapper theater-title-wrapper">LOADING TITLE...</div>
        </div>

        <div class="related-section-title">RELATED VIDEOS</div>
        <div class="video-grid" id="relatedContainer"></div>
        <div id="relatedLoadingStatus" class="loader" style="display:none;">LOADING RELATED...</div>
    </div>


    <script>
        const keywordsPool = ['myanmar', 'japan', 'asian', 'romance', 'sexy', 'leaked', 'amateur'];
        let query = 'all';
        let page = 1;
        let relatedPage = 1;
        let isLoading = false;
        let isRelatedLoading = false;

        window.onload = function() {
            setRandomFeed();
        };

        function filterCategory(cat, element) {
            document.querySelectorAll('.category-btn').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            query = cat === 'all' ? 'asian' : cat;
            page = 1;
            document.getElementById('container').innerHTML = '';
            fetchVideos(page);
        }

        function setRandomFeed() {
            query = 'asian';
            page = Math.floor(Math.random() * 5) + 1; 
            document.getElementById('container').innerHTML = '';
            fetchVideos(page);
        }
        
        async function fetchVideos(p) {
            if (isLoading) return;
            isLoading = true;
            document.getElementById('loadingStatus').style.display = 'block';

            try {
                const res = await fetch(`https://www.eporner.com/api/v2/video/search/?query=${encodeURIComponent(query)}&per_page=20&page=${p}&thumbsize=big`);
                const data = await res.json();
                const grid = document.getElementById('container');
                
                if (data && data.videos && data.videos.length > 0) {
                    data.videos.forEach(v => {
                        const div = document.createElement('div');
                        div.className = 'video-item';
                        div.onclick = () => play(v.embed, v.title);
                        div.innerHTML = `
                            <img src="${v.default_thumb.src}" class="thumb" loading="lazy">
                            <div class="video-meta-info">👁️ ${parseInt(v.views).toLocaleString()} VIEWS</div>
                        `;
                        grid.appendChild(div);
                    });
                }
            } catch (error) {
                console.error("Error:", error);
            } finally {
                document.getElementById('loadingStatus').style.display = 'none';
                isLoading = false;
            }
        }

        async function fetchRelatedVideos(p) {
            if (isRelatedLoading) return;
            isRelatedLoading = true;
            document.getElementById('relatedLoadingStatus').style.display = 'block';

            try {
                const randomKeyword = keywordsPool[Math.floor(Math.random() * keywordsPool.length)];
                const res = await fetch(`https://www.eporner.com/api/v2/video/search/?query=${encodeURIComponent(randomKeyword)}&per_page=12&page=${p}&thumbsize=big`);
                const data = await res.json();
                const grid = document.getElementById('relatedContainer');
                
                if (data && data.videos && data.videos.length > 0) {
                    data.videos.forEach(v => {
                        const div = document.createElement('div');
                        div.className = 'video-item';
                        div.onclick = () => play(v.embed, v.title);
                        div.innerHTML = `
                            <img src="${v.default_thumb.src}" class="thumb" loading="lazy">
                            <div class="video-meta-info">👁️ ${parseInt(v.views).toLocaleString()} VIEWS</div>
                        `;
                        grid.appendChild(div);
                    });
                }
            } catch (error) {
                console.error("Related Error:", error);
            } finally {
                document.getElementById('relatedLoadingStatus').style.display = 'none';
                isRelatedLoading = false;
            }
        }

        function play(url, title) {
            document.getElementById('theaterPage').style.display = 'block';
            document.getElementById('frame').src = url;
            document.getElementById('vTitle').innerText = title;
            
            document.getElementById('relatedContainer').innerHTML = '';
            relatedPage = Math.floor(Math.random() * 4) + 1;
            fetchRelatedVideos(relatedPage);

            document.getElementById('theaterPage').scrollTop = 0;
            document.body.style.overflow = 'hidden'; 
        }

        function closePlayer() {
            document.getElementById('theaterPage').style.display = 'none';
            document.getElementById('frame').src = '';
            document.body.style.overflow = 'auto'; 
        }

        function handleSearch(e) {
            if(e.key === 'Enter') {
                query = e.target.value;
                page = 1;
                closePlayer();
                document.getElementById('container').innerHTML = '';
                fetchVideos(page);
            }
        }

        function refreshToRandom() {
            closePlayer();
            document.getElementById('searchInput').value = '';
            setRandomFeed();
        }

        // Global Responsive Mobile Scroll Listener Configuration
        window.onscroll = () => {
            if (document.getElementById('theaterPage').style.display !== 'block') {
                if(window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - 500) {
                    if(!isLoading) { page++; fetchVideos(page); }
                }
            }
        };

        // Screen Theater Monitor Dynamic Lazy Feed Setup
        document.getElementById('theaterPage').onscroll = function() {
            const theater = document.getElementById('theaterPage');
            if (theater.scrollTop + theater.clientHeight >= theater.scrollHeight - 350) {
                if (!isRelatedLoading) {
                    relatedPage++;
                    fetchRelatedVideos(relatedPage);
                }
            }
        };
    </script>
</body>
</html>
