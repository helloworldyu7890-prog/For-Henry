<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BURMA APYR HD</title>
    
    <style>
        :root {
            --theme-color: #B0E0E6;
            --border-thick: 5px solid #000000;
            --card-gray: #7A7A7A;
            --text-dark: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial Black', 'Impact', sans-serif; }
        body { background: #ffffff; color: var(--text-dark); padding: 15px; overflow-x: hidden; }

        /* Animation Typewriter Effect */
        .typewriter {
            overflow: hidden;
            border-right: 3px solid var(--text-dark);
            white-space: nowrap;
            animation: typing 3.5s steps(40, end) infinite, blink-caret .75s step-end infinite;
        }
        @keyframes typing { 0%, 100% { width: 0 } 50% { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: black } }

        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 15px; }
        .logo-container { flex-grow: 1; background: var(--theme-color); border: var(--border-thick); border-radius: 24px; padding: 15px 20px; font-size: 20px; font-weight: 900; }
        
        .hero-banner { background: #ffffff; border: var(--border-thick); padding: 25px 20px; border-radius: 24px; margin-bottom: 25px; position: relative; }
        .hero-title, .hero-subtitle { font-size: 16px; font-weight: 900; margin-bottom: 10px; }

        .category-title { font-size: 20px; font-style: italic; font-weight: 900; margin-bottom: 20px; display: flex; align-items: center; }
        .category-btn { width: 90px; height: 90px; background: var(--card-gray); border: var(--border-thick); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 12px; font-weight: 900; color: white; cursor: pointer; }
        .category-btn.active { background: var(--theme-color); color: black; }

        .video-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .video-item { background: #EAEAEA; border-radius: 18px; overflow: hidden; border: var(--border-thick); cursor: pointer; }
        .thumb { width: 100%; aspect-ratio: 1.1/1; object-fit: cover; }
        .view-count { padding: 8px; font-size: 12px; font-weight: 900; color: #555; }

        #theaterPage { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #ffffff; padding: 15px; overflow-y: auto; z-index: 9999; }
        .player-box { width: 100%; aspect-ratio: 1.5/1; background: var(--theme-color); border: var(--border-thick); border-radius: 30px; margin-bottom: 20px; }
        .back-btn { background: var(--theme-color); border: var(--border-thick); padding: 10px; border-radius: 15px; font-weight: 900; cursor: pointer; display: inline-block; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="mainPageContent">
        <div class="nav-bar">
            <div class="logo-container typewriter">BURMA-APYR-HD</div>
        </div>

        <div class="hero-banner">
            <div class="hero-title typewriter">ပရီမီယမ် အတွေ့အကြုံ ပေးစွမ်းနိုင်မှု</div>
            <div class="hero-subtitle typewriter">burmaapyr.com အဆင့်မြင့်မြင့် ကြည့်ရှုနိုင်ပြီ</div>
        </div>

        <div class="category-title">CATEGORY</div>
        <div class="video-grid" id="container"></div>
    </div>

    <div id="theaterPage">
        <div class="back-btn" onclick="closePlayer()">← BACK</div>
        <div class="player-box"><iframe id="frame" src="" width="100%" height="100%" style="border:none;"></iframe></div>
        <h2 id="vTitle" class="typewriter" style="font-size: 16px; margin-bottom: 20px;"></h2>
        <div class="video-grid" id="relatedContainer"></div>
    </div>

    <script>
        async function fetchVideos() {
            const res = await fetch(`https://www.eporner.com/api/v2/video/search/?query=asian&per_page=20`);
            const data = await res.json();
            const grid = document.getElementById('container');
            grid.innerHTML = '';
            data.videos.forEach(v => {
                const div = document.createElement('div');
                div.className = 'video-item';
                div.onclick = () => play(v.embed, v.title);
                div.innerHTML = `
                    <img src="${v.default_thumb.src}" class="thumb">
                    <div class="view-count">👁️ ${parseInt(v.views).toLocaleString()} views</div>
                `;
                grid.appendChild(div);
            });
        }

        function play(url, title) {
            document.getElementById('theaterPage').style.display = 'block';
            document.getElementById('frame').src = url;
            document.getElementById('vTitle').innerText = title;
        }

        function closePlayer() { document.getElementById('theaterPage').style.display = 'none'; }

        fetchVideos();
    </script>
</body>
</html>
